name: Daily Commit

on:
  schedule:
    - cron: '0 12 * * *' # هر روز ساعت ۱۲ ظهر به وقت گرینویچ اجرا می‌شود
  workflow_dispatch: # برای اینکه بتونی دستی هم تستش کنی

jobs:
  make-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update a file
      run: |
        echo "Last update: $(date)" > daily_log.txt

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.name "github-actions[bot]@users.noreply.github.com"
        git add daily_log.txt
        git commit -m "chore: daily activity update"
        git push
